name: Harness Weekly Entropy Scan

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  entropy-scan:
    name: Entropy Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run entropy scans
        id: entropy
        run: |
          bun run harness:entropy 2>&1 | tee /tmp/entropy-output.txt
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/entropy-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run doc freshness check
        run: bun run harness/runtime/lint-docs-freshness.ts

      - name: Create issue if warnings found
        if: ${{ contains(steps.entropy.outputs.output, 'WARN') }}
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.entropy.outputs.output }}`;
            const warnings = output.split('\n').filter(l => l.includes('WARN') || l.includes('DRIFT') || l.includes('ORPHAN'));

            if (warnings.length > 0) {
              // Check if an open entropy issue already exists
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'entropy',
                state: 'open'
              });

              if (issues.data.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `Entropy scan warnings - ${new Date().toISOString().split('T')[0]}`,
                  body: `## Weekly Entropy Scan Warnings\n\n\`\`\`\n${output}\n\`\`\`\n\nReview and address the warnings above. Close this issue when resolved.`,
                  labels: ['entropy', 'maintenance']
                });
              }
            }
