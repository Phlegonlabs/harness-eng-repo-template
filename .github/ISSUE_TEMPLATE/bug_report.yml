name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, run `bun run harness:doctor` and check the output.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimum steps to reproduce the issue
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true

  - type: textarea
    id: validation-output
    attributes:
      label: Validation Output
      description: Paste the output of `bun run harness:validate`
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, git version
      placeholder: |
        OS: macOS 14 / Ubuntu 22.04
        bun: 1.3.10
        git: 2.53.0
